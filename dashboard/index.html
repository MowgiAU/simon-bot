<!DOCTYPE html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fuji Studio | Discover Music</title>
    <meta name="description" content="The home of FL Studio producers. Discover beats, share tracks, and join beat battles." />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="canonical" href="https://fujistud.io/" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="Fuji Studio" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Fuji Studio | Discover Music" />
    <meta property="og:description" content="The home of FL Studio producers. Discover beats, share tracks, and join beat battles." />
    <meta property="og:url" content="https://fujistud.io/" />
    <meta property="og:image" content="https://fujistud.io/og-default.png" />
    <meta property="og:image:alt" content="Fuji Studio — FL Studio producer community" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@fujistudio" />
    <meta name="twitter:title" content="Fuji Studio | Discover Music" />
    <meta name="twitter:description" content="The home of FL Studio producers. Discover beats, share tracks, and join beat battles." />
    <meta name="twitter:image" content="https://fujistud.io/og-default.png" />

    <!-- Theme & brand -->
    <meta name="theme-color" content="#2B8C71" />
    <meta name="application-name" content="Fuji Studio" />

    <!-- JSON-LD: WebSite + SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://fujistud.io/#website",
          "name": "Fuji Studio",
          "url": "https://fujistud.io",
          "description": "The home of FL Studio producers. Discover beats, share tracks, and join beat battles.",
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://fujistud.io/artists?q={search_term_string}"
            },
            "query-input": {
              "@type": "PropertyValueSpecification",
              "valueRequired": true,
              "valueName": "search_term_string"
            }
          }
        },
        {
          "@type": "Organization",
          "@id": "https://fujistud.io/#organization",
          "name": "Fuji Studio",
          "url": "https://fujistud.io",
          "logo": {
            "@type": "ImageObject",
            "url": "https://fujistud.io/logo.svg"
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
