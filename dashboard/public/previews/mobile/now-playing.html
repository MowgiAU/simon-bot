<script>
        // Simple script to generate a fake waveform
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('waveform-container');
            const numBars = 80;
            const progress = 0.35; // 35% played (1:24 / 3:45 approx)
            
            for (let i = 0; i < numBars; i++) {
                const bar = document.createElement('div');
                // Generate varied heights for waveform aesthetic
                const height = Math.random() * 80 + 20; 
                
                bar.className = `waveform-bar h-[${height}%]`;
                bar.style.height = `${height}%`;
                
                if (i / numBars < progress) {
                    bar.classList.add('active');
                } else if (i / numBars === progress) {
                    // Playhead indicator
                    bar.style.backgroundColor = '#FFFFFF';
                    bar.style.width = '2px';
                    bar.style.height = '100%';
                    bar.style.boxShadow = '0 0 10px rgba(255,255,255,0.8)';
                } else {
                    bar.classList.add('inactive');
                }
                
                container.appendChild(bar);
            }
        });
    </script>
